name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      # 1. Overview (only place where base is used)
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.overview.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity, community, repositories

      # 2. Isocalendar (ONLY calendar)
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.isocalendar.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 3. Introduction (ONLY intro text)
      - name: Introduction
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.introduction.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_introduction: yes

      # 4. Languages (NEW → replaces repeated activity)
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.languages.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8

      # 5. Achievements (ONLY badges)
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.achievements.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_achievements: yes
