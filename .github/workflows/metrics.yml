name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      # 1. Overview
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.overview.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity, community, repositories

      # 2. About Me (FIXED TEXT)
      - name: About Me
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.introduction.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_introduction: yes
          plugin_introduction_title: About Me
          plugin_introduction_text: "Software Engineer || Avid Learner || Competitive Programmer || Built Different"

      # 3. Isocalendar
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.isocalendar.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 4. Languages (REAL DATA)
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.languages.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 4
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes

      # 5. WakaTime
      - name: WakaTime
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.wakatime.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
