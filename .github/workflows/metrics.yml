name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      # Overview
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.overview.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity, community, repositories

      # About Me
      - name: About Me
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.introduction.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_introduction: yes
          plugin_introduction_title: About Me
          plugin_introduction_text: |
            Software Engineer || Avid Learner || Competitive Programmer || Built Different

      # Isocalendar
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.isocalendar.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Languages (C++ JS HTML CSS only)
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.languages.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 4
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_filter: C++, JavaScript, HTML, CSS

      # WakaTime
      - name: WakaTime
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.wakatime.svg
          user: devshriram
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
